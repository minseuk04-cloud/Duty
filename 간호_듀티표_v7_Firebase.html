<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px}

.tab-btn:hover{background:#f5f5f5}
.badge{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 18px}
.toast{position:fixed;top:16px;right:16px;z-index:9999;padding:9px 20px;font-size:13px;background:#fff;border:1px solid #ccc;border-radius:7px;box-shadow:0 2px 10px rgba(0,0,0,.14);font-weight:600}
.vdot{position:absolute;top:1px;right:1px;width:5px;height:5px;border-radius:50%}
.wchip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;margin:2px}
.wchip.on{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.wchip.off{background:#f5f5f5;color:#999;border-color:#ddd}
.wcard{border:1px solid #ddd;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;background:#fff}
.wcard:hover{border-color:#5585c5;background:#f8fbff}
.wcard.active{border-color:#1a3a6b;border-width:2px;background:#f0f4ff}
.role-admin{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:#f3e8ff;color:#7c3aed;font-size:11px;font-weight:700;border:1px solid #ddd8ff}
.role-ward{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5;font-size:11px;font-weight:700;border:1px solid #B5D4F4}
.fb-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.fb-ok{background:#22c55e}
.fb-off{background:#94a3b8}
.fb-err{background:#ef4444}
#lock{position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#0d1b3e 0%,#1a3a6b 60%,#0d1b3e 100%);display:flex;align-items:center;justify-content:center;padding:16px}
.lcard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:36px 40px;text-align:center;width:100%;max-width:440px}
.lcard h1{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.lsub{color:rgba(255,255,255,.55);font-size:12px;margin-bottom:24px}
.linput{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.28);border-radius:8px;color:#fff;font-size:14px;padding:11px 14px;width:100%;margin-bottom:10px;font-family:inherit;letter-spacing:2px}
.linput::placeholder{color:rgba(255,255,255,.35);letter-spacing:0}
.lbtn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit}
.btn-admin{background:linear-gradient(90deg,#7c3aed,#6d28d9);color:#fff}.btn-admin:hover{opacity:.9}
.btn-ward{background:linear-gradient(90deg,#2a5298,#3b7dd8);color:#fff}.btn-ward:hover{opacity:.9}
.lerr{color:#ff8080;font-size:12px;min-height:18px;margin-top:4px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.mbtn{padding:16px 10px;border-radius:10px;border:2px solid transparent;background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
.mbtn:hover{background:rgba(255,255,255,.14)}
.mbtn .ico{font-size:28px;display:block;margin-bottom:6px}
.lnote{color:rgba(255,255,255,.28);font-size:11px;margin-top:16px}
.back-btn{width:100%;background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-family:inherit;font-size:12px;margin-top:6px;padding:4px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.maker-bar{background:linear-gradient(90deg,#1a3a6b,#2a5298);color:#fff;text-align:center;padding:5px 0;font-size:12px}

<!-- ══════════════════════════════════════════════════════
  ★  Firebase 설정  ★
  아래 FILL_IN 부분을 Firebase 콘솔에서 복사한 값으로 교체하세요.
  설정 방법: 파일 아래쪽 주석 참고
═══════════════════════════════════════════════════════ -->
<script>
const FB_CONFIG = {
  apiKey:            "AIzaSyCOAZjZ9KudjJoxQAOFaXfXs9z7TAXyP2k",
  authDomain:        "duty-40083.firebaseapp.com",
  projectId:         "duty-40083",
  storageBucket:     "duty-40083.firebasestorage.app",
  messagingSenderId: "477123177711",
  appId:             "1:477123177711:web:4d957f42a886d8740b3f1a"
};
/* ─────────────────────────────────────────────────── */

const FB_ON = !Object.values(FB_CONFIG).includes("FILL_IN");
let db = null;
if(FB_ON){try{firebase.initializeApp(FB_CONFIG);db=firebase.firestore();}catch(e){console.error('Firebase init error',e);}}

// ─── 캐시 (로그인 전 로드된 데이터) ───
window.CACHE={auth:{},settings:{},scheds:{}};

// ─── 데이터 서비스 (Firebase ↔ localStorage 공용) ───
const DS={
  async loadAll(){
    if(FB_ON&&db){
      try{
        const[aDoc,sDoc,scSnap]=await Promise.all([
          db.collection('jm_duty').doc('auth').get(),
          db.collection('jm_duty').doc('settings').get(),
          db.collection('jm_duty_scheds').get()
        ]);
        CACHE.auth=aDoc.exists?aDoc.data():{};
        CACHE.settings=sDoc.exists?sDoc.data():{};
        CACHE.scheds={};
        scSnap.forEach(d=>{CACHE.scheds[d.id]=d.data().cells||{};});
        return true;
      }catch(e){console.error('FB load error',e);}
    }
    // localStorage 폴백
    try{
      const ap=JSON.parse(localStorage.getItem('jm_admin_pw')||'{}');
      const wp=JSON.parse(localStorage.getItem('jm_ward_pws')||'{}');
      CACHE.auth={adminPwHash:ap.hash||null,wardPws:wp};
      CACHE.settings=JSON.parse(localStorage.getItem('jm_app_v4')||'{}');
      CACHE.scheds=JSON.parse(localStorage.getItem('jm_scheds_v4')||'{}');
    }catch{}
    return false;
  },
  async saveAuth(patch){
    const merged={...CACHE.auth,...patch};
    if(patch.wardPws)merged.wardPws={...CACHE.auth.wardPws,...patch.wardPws};
    if(FB_ON&&db){try{await db.collection('jm_duty').doc('auth').set(merged);}catch(e){console.error(e);}}
    else{
      if(merged.adminPwHash)localStorage.setItem('jm_admin_pw',JSON.stringify({hash:merged.adminPwHash}));
      if(merged.wardPws)localStorage.setItem('jm_ward_pws',JSON.stringify(merged.wardPws));
    }
    CACHE.auth=merged;
  },
  async saveSettings(data){
    if(FB_ON&&db){try{await db.collection('jm_duty').doc('settings').set(data);}catch(e){console.error(e);}}
    else{localStorage.setItem('jm_app_v4',JSON.stringify(data));}
    CACHE.settings=data;
  },
  async saveSched(key,cells){
    if(FB_ON&&db){try{await db.collection('jm_duty_scheds').doc(key).set({cells,updatedAt:new Date().toISOString()});}catch(e){console.error(e);}}
    else{const a=JSON.parse(localStorage.getItem('jm_scheds_v4')||'{}');a[key]=cells;localStorage.setItem('jm_scheds_v4',JSON.stringify(a));}
    CACHE.scheds[key]=cells;
  },
  async deleteWardData(wn){
    if(FB_ON&&db){
      try{
        const snap=await db.collection('jm_duty_scheds').get();
        const batch=db.batch();
        snap.docs.filter(d=>d.id.startsWith(wn+'_')).forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }catch(e){console.error(e);}
    }else{
      const a=JSON.parse(localStorage.getItem('jm_scheds_v4')||'{}');
      Object.keys(a).filter(k=>k.startsWith(wn+'_')).forEach(k=>delete a[k]);
      localStorage.setItem('jm_scheds_v4',JSON.stringify(a));
    }
  }
};

// ─── 잠금 화면 ───
const ES=':jm2024!';
window.JMenc=s=>btoa(unescape(encodeURIComponent(s+ES)));
window.JMverify=(p,h)=>JMenc(p)===h;
window.SESSION={role:null,ward:null};

function serr(m){document.getElementById('lerr').textContent=m;}
function sclr(){document.getElementById('lerr').textContent='';}
function bk(fn){return`<button class="back-btn" onclick="${fn}">← 뒤로</button>`;}

function showMode(){
  document.getElementById('lsub').textContent='접근 방식을 선택하세요';
  const fb=FB_ON?`<div style="margin-bottom:14px;padding:7px 12px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:7px;font-size:11px;color:#86efac">☁️ Firebase 클라우드 연결됨 — 모든 PC 데이터 자동 공유</div>`:`<div style="margin-bottom:14px;padding:7px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:7px;font-size:11px;color:rgba(255,255,255,.5)">📱 로컬 저장 모드 (Firebase 미설정)</div>`;
  const localWarn=location.protocol==='file:'?`<div style="margin-bottom:14px;padding:8px 12px;background:rgba(255,200,50,.15);border:1px solid rgba(255,200,50,.3);border-radius:7px;font-size:11px;color:#fde68a;line-height:1.6">⚠️ 로컬 파일로 열렸습니다.<br/>Firebase 클라우드 기능을 사용하려면<br/>이 파일을 <b>Google Drive에 업로드</b> 후 링크로 여세요.</div>`:'';
  document.getElementById('lbody').innerHTML=localWarn+fb+`<div class="mode-grid"><button class="mbtn" onclick="showAdmin()"><span class="ico">👑</span>최고 관리자</button><button class="mbtn" onclick="showWardList()"><span class="ico">🏥</span>병동 로그인</button></div>`;sclr();
}
function showAdmin(){
  document.getElementById('lsub').textContent='최고 관리자 로그인';
  const isNew=!CACHE.auth.adminPwHash;
  document.getElementById('lbody').innerHTML=isNew?`
    <p style="color:rgba(255,255,255,.6);font-size:12px;margin-bottom:14px;line-height:1.7">처음 실행 시 최고 관리자 비밀번호를 설정합니다.</p>
    <input class="linput" type="password" id="a1" placeholder="새 비밀번호 (4자 이상)" onkeydown="if(event.key==='Enter')document.getElementById('a2').focus()"/>
    <input class="linput" type="password" id="a2" placeholder="비밀번호 확인" onkeydown="if(event.key==='Enter')doACr()"/>
    <button class="lbtn btn-admin" onclick="doACr()">비밀번호 설정 및 시작</button>${bk('showMode()')}`:
    `<input class="linput" type="password" id="apw" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doALg()"/>
    <button class="lbtn btn-admin" onclick="doALg()">관리자로 로그인</button>${bk('showMode()')}`;
  sclr();setTimeout(()=>{const e=document.getElementById('a1')||document.getElementById('apw');if(e)e.focus();},80);
}
function showWardList(){
  const wards=(CACHE.settings.wards)||[];
  document.getElementById('lsub').textContent='병동을 선택하세요';
  if(!wards.length){document.getElementById('lbody').innerHTML=`<p style="color:rgba(255,255,255,.55);font-size:13px;margin:14px 0">등록된 병동이 없습니다.<br/>최고 관리자로 로그인하여 병동을 먼저 생성해 주세요.</p><button class="lbtn btn-admin" onclick="showAdmin()">최고 관리자 로그인</button>${bk('showMode()')}`;return;}
  const btns=wards.map(w=>`<button class="mbtn" onclick="showWardLogin('${w.name}')" style="text-align:left;padding:12px 14px"><span style="font-size:15px;font-weight:700;display:block">${w.name}</span><span style="font-size:11px;opacity:.7">병상 ${w.beds}개 · 환자 ${w.patients}명</span></button>`).join('');
  document.getElementById('lbody').innerHTML=`<div style="display:grid;gap:8px;margin-bottom:10px;max-height:260px;overflow-y:auto">${btns}</div>${bk('showMode()')}`;sclr();
}
function showWardLogin(wn){
  document.getElementById('lsub').textContent=`${wn} 로그인`;
  document.getElementById('lbody').innerHTML=`
    <p style="color:rgba(255,255,255,.6);font-size:13px;margin-bottom:14px">${wn} 비밀번호를 입력하세요</p>
    <input class="linput" type="password" id="wpw" placeholder="병동 비밀번호" onkeydown="if(event.key==='Enter')doWLg('${wn}')"/>
    <button class="lbtn btn-ward" onclick="doWLg('${wn}')">로그인</button>${bk('showWardList()')}`;
  sclr();setTimeout(()=>{const e=document.getElementById('wpw');if(e)e.focus();},80);
}
window.doACr=async function(){
  const p1=document.getElementById('a1').value,p2=document.getElementById('a2').value;
  if(p1.length<4){serr('4자 이상 입력하세요');return;}if(p1!==p2){serr('비밀번호가 일치하지 않습니다');return;}
  document.getElementById('lbody').innerHTML=`<div style="color:#fff;font-size:14px"><span class="spin"></span>저장 중...</div>`;
  await DS.saveAuth({adminPwHash:JMenc(p1)});
  SESSION.role='admin';SESSION.ward=null;unlock();
};
window.doALg=function(){
  const p=document.getElementById('apw').value;
  if(CACHE.auth.adminPwHash&&JMverify(p,CACHE.auth.adminPwHash)){SESSION.role='admin';SESSION.ward=null;unlock();}
  else{serr('비밀번호가 올바르지 않습니다');document.getElementById('apw').value='';}
};
window.doWLg=function(wn){
  const p=document.getElementById('wpw').value,pws=CACHE.auth.wardPws||{};
  if(!pws[wn]){serr('비밀번호가 설정되지 않았습니다. 관리자에게 문의하세요.');return;}
  if(JMverify(p,pws[wn])){SESSION.role='ward';SESSION.ward=wn;unlock();}
  else{serr('병동 비밀번호가 올바르지 않습니다');document.getElementById('wpw').value='';}
};
function unlock(){document.getElementById('lock').style.display='none';document.getElementById('main-app').style.display='block';if(window._renderApp)window._renderApp();}

// 앱 초기화: Firebase 데이터 로드 후 잠금화면 표시 (5초 타임아웃)
(async()=>{
  document.getElementById('lsub').textContent='';
  document.getElementById('lbody').innerHTML=`<div style="color:rgba(255,255,255,.7);font-size:14px;margin:20px 0"><span class="spin"></span>${FB_ON?'Firebase 서버 연결 중...':'로컬 데이터 로드 중...'}</div>`;
  try{
    await Promise.race([
      DS.loadAll(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),5000))
    ]);
  }catch(e){
    console.warn('Firebase load timeout or error, falling back to local:',e.message);
    // 로컬 데이터라도 로드
    try{
      const ap=JSON.parse(localStorage.getItem('jm_admin_pw')||'{}');
      const wp=JSON.parse(localStorage.getItem('jm_ward_pws')||'{}');
      CACHE.auth={adminPwHash:ap.hash||null,wardPws:wp};
      CACHE.settings=JSON.parse(localStorage.getItem('jm_app_v4')||'{}');
      CACHE.scheds=JSON.parse(localStorage.getItem('jm_scheds_v4')||'{}');
    }catch{}
  }
  showMode();
})();
document.addEventListener('contextmenu',e=>e.preventDefault());
</script>

<script type="text/babel">

const GD=[{g:1,max:2.0,label:'1등급',bg:'#E6F1FB',color:'#0C447C'},{g:2,max:2.5,label:'2등급',bg:'#EAF3DE',color:'#27500A'},{g:3,max:3.0,label:'3등급',bg:'#EAF3DE',color:'#3B6D11'},{g:4,max:3.5,label:'4등급',bg:'#FAEEDA',color:'#633806'},{g:5,max:4.0,label:'5등급',bg:'#FAEEDA',color:'#854F0B'},{g:6,max:5.0,label:'6등급',bg:'#FCEBEB',color:'#A32D2D'},{g:7,max:999,label:'7등급',bg:'#F7C1C1',color:'#791F1F'}];
const VT={ND:{sev:'error',tag:'야간→데이',desc:'야간 직후 데이(법적위반)'},NE:{sev:'warn',tag:'야간→이브닝',desc:'야간 직후 이브닝(8h미만)'},DE:{sev:'warn',tag:'데이→야간',desc:'데이 다음날 야간'},N4:{sev:'error',tag:'4연속야간',desc:'4일이상 연속 야간'},N3:{sev:'warn',tag:'3연속야간',desc:'3일 연속 야간'},W7:{sev:'error',tag:'7연속근무',desc:'7일이상 연속(근기법위반)'},W5:{sev:'warn',tag:'5연속근무',desc:'5~6일 연속 근무'}};
const dim=(y,m)=>new Date(y,m,0).getDate();
const dow=(y,m,d)=>new Date(y,m-1,d).getDay();
const p2=n=>String(n).padStart(2,'0');
const wkN=(y,m,d)=>Math.ceil((d+dow(y,m,1))/7);
const WORK=new Set(['D','E','N','HL']);
const cm=n=>n.toLocaleString();
function isPH(y,m,d,b,c){const md=`${p2(m)}-${p2(d)}`,ymd=`${y}-${p2(m)}-${p2(d)}`;return b.some(h=>h.md===md)||c.some(h=>h.date===ymd);}
function phN(y,m,d,b,c){const md=`${p2(m)}-${p2(d)}`,ymd=`${y}-${p2(m)}-${p2(d)}`;return(b.find(h=>h.md===md)||c.find(h=>h.date===ymd)||{}).name||null;}
function getViol(sc,names,y,m){
  const d=dim(y,m),cv={},msgs=[];const g=(nm,day)=>sc[`${nm}_${day}`]||null;const mk=(nm,day,t)=>{const k=`${nm}_${day}`;if(!cv[k])cv[k]=[];cv[k].push(t);};
  names.forEach(name=>{for(let day=1;day<=d;day++){const cur=g(name,day),p1=g(name,day-1),p2v=g(name,day-2),p3=g(name,day-3);
    if(p1==='N'&&cur==='D'){mk(name,day,'ND');mk(name,day-1,'ND');msgs.push({name,day,type:'ND',sev:'error'});}
    if(p1==='N'&&cur==='E'){mk(name,day,'NE');msgs.push({name,day,type:'NE',sev:'warn'});}
    if(p1==='D'&&cur==='N'){mk(name,day,'DE');msgs.push({name,day,type:'DE',sev:'warn'});}
    if(cur==='N'&&p1==='N'&&p2v==='N'&&p3==='N'){[day,day-1,day-2,day-3].forEach(dd=>mk(name,dd,'N4'));msgs.push({name,day,type:'N4',sev:'error'});}
    else if(cur==='N'&&p1==='N'&&p2v==='N'&&p3!=='N'){[day,day-1,day-2].forEach(dd=>mk(name,dd,'N3'));msgs.push({name,day,type:'N3',sev:'warn'});}
    if(WORK.has(cur)){let cnt=0;for(let b=0;b<8&&day-b>=1;b++){if(WORK.has(g(name,day-b)))cnt++;else break;}
      if(cnt===7){mk(name,day,'W7');msgs.push({name,day,type:'W7',sev:'error'});}else if(cnt===5||cnt===6){mk(name,day,'W5');msgs.push({name,day,type:'W5',sev:'warn'});}}
  }});return{cv,msgs};
}
function autoGen(names,y,m,req){
  const n=names.length,d=dim(y,m),ns={};if(!n)return ns;
  const PAT=['D','D','D','D','OFF','OFF','E','E','E','E','OFF','OFF','N','N','N','OFF','OFF','OFF'];
  const PL=PAT.length,step=Math.max(1,Math.floor(PL/n));
  names.forEach((nm,ni)=>{const off=(ni*step)%PL;for(let day=1;day<=d;day++)ns[`${nm}_${day}`]=PAT[(off+day-1)%PL];});
  names.forEach(nm=>{for(let day=2;day<=d;day++){const p=ns[`${nm}_${day-1}`],c=ns[`${nm}_${day}`];if(p==='N'&&(c==='D'||c==='E'))ns[`${nm}_${day}`]='OFF';}});
  for(let day=1;day<=d;day++){const cov={D:0,E:0,N:0};names.forEach(nm=>{const s=ns[`${nm}_${day}`];if(cov[s]!==undefined)cov[s]++;});['D','E','N'].forEach(sh=>{for(let ni=0;ni<n&&cov[sh]<(req[sh]||0);ni++){const k=`${names[ni]}_${day}`,prev=ns[`${names[ni]}_${day-1}`];if(ns[k]==='OFF'&&!(sh==='D'&&prev==='N')&&!(sh==='E'&&prev==='N')){ns[k]=sh;cov[sh]++;}}});}
  return ns;
}
function calcStats(name,sc,y,m,nr){
  const tot=dim(y,m);let wD=0,tH=0,nH=0;const wkH={},cnt={};
  for(let d=1;d<=tot;d++){const s=sc[`${name}_${d}`];if(!s)continue;cnt[s]=(cnt[s]||0)+1;const sh=SH[s];if(!sh)continue;if(sh.h>0){if(sh.work)wD++;tH+=sh.h;const w=wkN(y,m,d);wkH[w]=(wkH[w]||0)+sh.h;if(sh.night)nH+=sh.h;}}
  let oH=0;Object.values(wkH).forEach(h=>{if(h>40)oH+=h-40;});
  const oP=Math.round(oH*(nr.base||0)*0.5),nP=nr.nightEnabled?Math.round(nH*(nr.night||0)):0;
  return{workDays:wD,totalH:tH,nightH:nH,overH:oH,overPay:oP,nightPay:nP,extra:oP+nP,cnt,alD:cnt.AL||0,hlD:cnt.HL||0,baseRate:nr.base||0,nightRate:nr.night||0,nightEnabled:!!nr.nightEnabled};
}
function calcGrade(patients,sc,names,y,m){
  const d=dim(y,m);let tot=0;for(let day=1;day<=d;day++)names.forEach(nm=>{const s=sc[`${nm}_${day}`];if(s&&SH[s]?.work)tot++;});
  const avg=tot/d,ratio=avg>0?patients/avg:999,r=Math.round(ratio*100)/100;
  return{ratio:r,gd:GD.find(g=>r<g.max)||GD[6]};
}

              <div style={{flex:'1 1 100px',minWidth:80}}><div style={{fontSize:13,fontWeight:600}}>{n.name}</div><div style={{fontSize:10,color:'#888'}}>기본{cm(r.base)}원{r.nightEnabled?<span style={{color:'#534AB7'}}> · 야간수당</span>:''}</div></div>
              <div style={{display:'flex',gap:3,flexWrap:'wrap',flex:'1 1 auto'}}>{wards.map(w=>(<button key={w.name} onClick={()=>toggleNW(n.name,w.name)} className={`wchip ${(n.wards||[]).includes(w.name)?'on':'off'}`}>{w.name}</button>))}{(!(n.wards)||n.wards.length===0)&&<span style={{fontSize:10,color:'#ccc',padding:'2px 6px'}}>미배정</span>}</div>
              <button onClick={()=>rmNurse(n.name)} style={{fontSize:11,padding:'3px 10px',color:'#A32D2D',background:'#FCEBEB',border:'1px solid #F7C1C1',borderRadius:5,flexShrink:0}}>삭제</button>
            </div>);})}
          </div>
          <div style={{display:'flex',gap:8}}><input value={newNurse} onChange={e=>setNewNurse(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNurse()} placeholder="간호사 이름 입력 후 Enter" style={{flex:1,fontSize:13,padding:'7px 12px'}}/><button onClick={addNurse} style={{fontSize:13,padding:'7px 18px',background:'#185FA5',color:'#fff',border:'none',width:'auto',fontWeight:600,borderRadius:6}}>추가</button></div>
        </div>)}

        {tab==='holidays'&&isAdmin&&(<div style={{padding:16,maxWidth:480}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>법정 공휴일</div>
          <div style={{border:'1px solid #ddd',borderRadius:10,overflow:'hidden',marginBottom:16}}>{BPH.map((h,i)=>(<div key={h.md} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:i<BPH.length-1?'1px solid #f0f0f0':'none'}}><input type="checkbox" checked={bph.some(b=>b.md===h.md)} onChange={()=>setBph(p=>p.some(b=>b.md===h.md)?p.filter(b=>b.md!==h.md):[...p,h])}/><span style={{fontSize:13}}>{h.md.replace('-','월 ')}일 — <b>{h.name}</b></span></div>))}</div>
          <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>임시공휴일 추가</div>
          <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}><input type="date" value={nhD} onChange={e=>setNhD(e.target.value)} style={{width:'auto',flex:'0 0 auto',fontSize:13,padding:'5px 9px'}}/><input type="text" value={nhN} onChange={e=>setNhN(e.target.value)} onKeyDown={e=>e.key==='Enter'&&nhD&&nhN.trim()&&(setCph(p=>[...p,{date:nhD,name:nhN.trim()}]),setNhD(''),setNhN(''))} placeholder="공휴일명" style={{flex:1,minWidth:120}}/><button onClick={()=>{if(!nhD||!nhN.trim())return;setCph(p=>[...p,{date:nhD,name:nhN.trim()}]);setNhD('');setNhN('');}} style={{fontSize:13,padding:'5px 14px',background:'#534AB7',color:'#fff',border:'none',width:'auto',borderRadius:6}}>추가</button></div>
          {cph.length>0&&<div style={{border:'1px solid #ddd',borderRadius:10,overflow:'hidden'}}>{cph.map((h,i)=>(<div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 14px',borderBottom:i<cph.length-1?'1px solid #f0f0f0':'none',background:'#FAEEDA'}}><span style={{fontSize:13,color:'#854F0B'}}>{h.date} — {h.name}</span><button onClick={()=>setCph(p=>p.filter((_,j)=>j!==i))} style={{fontSize:11,padding:'2px 8px',color:'#A32D2D',background:'#FCEBEB',border:'1px solid #F7C1C1'}}>삭제</button></div>))}</div>}
        </div>)}

        {tab==='settings'&&isAdmin&&(<div style={{padding:16,maxWidth:560}}>
          {/* Firebase 상태 */}
          <div style={{marginBottom:18,padding:'14px 16px',background:window.FB_ON?'linear-gradient(135deg,#e0ffe8,#e0f0ff)':'linear-gradient(135deg,#f5f5f5,#e8e8e8)',border:`1px solid ${window.FB_ON?'#86efac':'#ddd'}`,borderRadius:10}}>
            <div style={{fontWeight:700,fontSize:14,color:window.FB_ON?'#15803d':'#555',marginBottom:6}}>{window.FB_ON?'☁️ Firebase 클라우드 연결됨':'📱 로컬 저장 모드'}</div>
            {window.FB_ON?(<div style={{fontSize:12,color:'#166534',lineHeight:1.8}}>
              모든 데이터가 Firebase에 자동 저장됩니다.<br/>
              어느 PC에서나 로그인하면 같은 데이터를 사용할 수 있습니다.<br/>
              듀티 셀 변경 후 2초, 설정 변경 후 3초 내 자동 저장됩니다.
            </div>):(<div style={{fontSize:12,color:'#555',lineHeight:1.8}}>
              현재 이 PC의 브라우저에만 저장됩니다.<br/>
              <b>Firebase 설정 방법</b>은 이 파일을 메모장으로 열어 맨 위의<br/>
              <code style={{background:'#fff',padding:'1px 5px',borderRadius:3,fontSize:11}}>FB_CONFIG</code> 안의 "FILL_IN"을 Firebase 콘솔 값으로 교체하세요.<br/>
              <a href="https://console.firebase.google.com" target="_blank" style={{color:'#185FA5'}}>👉 console.firebase.google.com</a>
            </div>)}
          </div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>관리자 비밀번호 변경</div>
          <div className="card" style={{marginBottom:16}}>
            {[{l:'현재 관리자 비밀번호',v:adPwO,s:setAdPwO},{l:'새 비밀번호 (4자 이상)',v:adPwN1,s:setAdPwN1},{l:'새 비밀번호 확인',v:adPwN2,s:setAdPwN2}].map(({l,v,s})=>(<div key={l} style={{marginBottom:12}}><label style={{fontSize:12,color:'#666',display:'block',marginBottom:4}}>{l}</label><input type="password" value={v} onChange={e=>s(e.target.value)} style={{fontSize:13,padding:'6px 10px'}}/></div>))}
            {adPwMsg&&<div style={{fontSize:12,padding:'6px 10px',borderRadius:5,background:adPwMsg.includes('✓')?'#EAF3DE':'#FCEBEB',color:adPwMsg.includes('✓')?'#3B6D11':'#A32D2D',marginBottom:10}}>{adPwMsg}</div>}
            <button onClick={changeAdminPw} style={{width:'100%',padding:'9px',fontSize:13,background:'#7c3aed',color:'#fff',border:'none',fontWeight:700,borderRadius:6}}>관리자 비밀번호 변경</button>
          </div>
          <div className="card" style={{background:'#f8f8f8',marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:8,color:'#555'}}>데이터 관리</div>
            <button onClick={saveAll} disabled={isSaving} style={{width:'100%',padding:'8px',fontSize:13,marginBottom:8,fontWeight:600,borderRadius:6}}>즉시 저장 {window.FB_ON?'(Firebase)':'(로컬)'}</button>
            <button onClick={()=>{if(window.confirm('모든 데이터를 초기화하시겠습니까?')){['jm_app_v4','jm_scheds_v4','jm_admin_pw','jm_ward_pws'].forEach(k=>localStorage.removeItem(k));window.location.reload();}}} style={{width:'100%',padding:'8px',fontSize:13,color:'#A32D2D',background:'#FCEBEB',border:'1px solid #F7C1C1',borderRadius:6}}>로컬 데이터 초기화</button>
          </div>
          <div style={{padding:'14px 18px',background:'#f0f4ff',border:'1px solid #c8d8f8',borderRadius:10,textAlign:'center'}}><div style={{fontSize:13,fontWeight:700,color:'#1a3a6b',marginBottom:4}}>제작 JM</div><div style={{fontSize:12,color:'#555'}}>수정문의 <b>010-5570-1571</b></div></div>
        </div>)}

      </div>
    </div>
  );
}

window._renderApp=()=>ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<!--
════════════════════════════════════════════════════════
  Firebase 설정 방법 (5단계, 10분 소요)
════════════════════════════════════════════════════════

1단계: Firebase 프로젝트 만들기
  - https://console.firebase.google.com 접속 (구글 계정 필요)
  - "프로젝트 추가" 클릭
  - 프로젝트 이름 입력 (예: nursing-duty)
  - Google 애널리틱스 OFF → "프로젝트 만들기"

2단계: Firestore 데이터베이스 활성화
  - 왼쪽 메뉴 "Firestore Database" 클릭
  - "데이터베이스 만들기" 클릭
  - "테스트 모드에서 시작" 선택 → "다음"
  - 위치: asia-northeast3 (서울) 선택 → "완료"

3단계: 웹 앱 등록 및 설정값 복사
  - 프로젝트 홈에서 "</>" (웹) 아이콘 클릭
  - 앱 닉네임 입력 (예: duty-app) → "앱 등록"
  - 아래와 같은 코드가 나타납니다:
    const firebaseConfig = {
      apiKey: "AIza...",
      authDomain: "nursing-duty-xxxxx.firebaseapp.com",
      projectId: "nursing-duty-xxxxx",
      storageBucket: "nursing-duty-xxxxx.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

4단계: 이 파일에 설정값 입력
  - 이 HTML 파일을 메모장으로 열기
  - 맨 위 FB_CONFIG 부분의 "FILL_IN"을 각 값으로 교체
  - 예: apiKey: "AIza..." (따옴표 안에 넣으세요)
  - 저장

5단계: Firestore 보안 규칙 설정
  - Firebase 콘솔 → Firestore → 규칙 탭
  - 아래 내용으로 교체 후 "게시":
  
  rules_version = '2';
  service cloud.firestore {
    match /databases/{database}/documents {
      match /{document=**} {
        allow read, write: if true;
      }
    }
  }

완료! 이제 모든 PC에서 같은 파일을 열면 데이터가 공유됩니다.

무료 사용량 (Firebase Spark 플랜):
  - 저장 용량: 1GB (충분)
  - 읽기: 하루 50,000회 (충분)
  - 쓰기: 하루 20,000회 (충분)

════════════════════════════════════════════════════════
-->
